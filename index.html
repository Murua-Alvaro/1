<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa de aspirantes por sección - Mazatlán</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .panel {
      max-width: 1280px;
      margin: 24px auto 16px;
      padding: 0 18px;
      display: grid;
      grid-template-columns: 1fr 1fr 1.35fr;
      gap: 18px;
      align-items: stretch;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #111827;
    }

    p {
      margin: 0;
      color: #475467;
      font-size: 14px;
      line-height: 1.5;
    }

    label {
      font-weight: 700;
      display: block;
      margin-bottom: 8px;
      color: #111827;
    }

    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #d0d5dd;
      font-size: 16px;
      background: white;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 2px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      background: #111827;
      color: white;
    }

    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    #map {
      max-width: 1280px;
      height: 760px;
      margin: 0 auto 28px;
      border: 1px solid #d0d5dd;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
    }

    .info-box {
      font-size: 15px;
      line-height: 1.55;
    }

    .info-box strong {
      font-size: 18px;
    }

    .badge {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      color: white;
      font-weight: 700;
      font-size: 12px;
      margin-top: 6px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .stat {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
    }

    .stat b {
      display: block;
      font-size: 18px;
      color: #111827;
      margin-bottom: 2px;
    }

    .legend {
      background: white;
      padding: 12px 14px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      font-size: 13px;
      line-height: 1.6;
    }

    .legend span {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: middle;
    }

    @media (max-width: 1000px) {
      .panel {
        grid-template-columns: 1fr;
      }

      #map {
        height: 650px;
        border-radius: 0;
      }
    }
  </style>
</head>

<body>

  <div class="panel">
    <div class="card">
      <label for="districtSelect">Filtrar por distrito</label>
      <select id="districtSelect">
        <option value="">Cargando distritos...</option>
      </select>

      <div class="actions">
        <button id="showAllBtn" class="secondary">Ver todas las secciones</button>
      </div>
    </div>

    <div class="card">
      <label for="sectionSelect">Seleccionar sección</label>
      <select id="sectionSelect">
        <option value="">Cargando secciones...</option>
      </select>

      <p>El mapa se cruza por <b>sección</b>. El distrito sólo funciona como filtro.</p>
    </div>

    <div class="card">
      <h1 id="mainTitle">Mapa de aspirantes por sección</h1>
      <p id="mainInfo">
        Selecciona una sección o filtra por distrito para ver aspirantes registrados, semáforo y distribución por edad.
      </p>

      <div class="stats-grid">
        <div class="stat">
          <b id="totalSecciones">-</b>
          Secciones visibles
        </div>
        <div class="stat">
          <b id="totalAspirantes">-</b>
          Aspirantes visibles
        </div>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([23.245, -106.41], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let geojsonLayer;
    let selectedSection = null;
    let selectedDistrict = '';
    let aspirantesPorSeccion = {};
    let geojsonDataGlobal = null;

    const districtSelect = document.getElementById('districtSelect');
    const sectionSelect = document.getElementById('sectionSelect');
    const showAllBtn = document.getElementById('showAllBtn');
    const mainTitle = document.getElementById('mainTitle');
    const mainInfo = document.getElementById('mainInfo');
    const totalSeccionesEl = document.getElementById('totalSecciones');
    const totalAspirantesEl = document.getElementById('totalAspirantes');

    function getSeccion(feature) {
      return String(feature.properties.seccion);
    }

    function getDistrito(feature) {
      return String(feature.properties.distrito_l);
    }

    function getDatosSeccion(seccion) {
      return aspirantesPorSeccion[String(seccion)] || {
        total_aspirantes: 0,
        semaforo: 'Rojo',
        color: '#E53935',
        rango_edad_principal: 'Sin datos',
        edad_18_29: 0,
        edad_30_44: 0,
        edad_45_59: 0,
        edad_60_mas: 0
      };
    }

    function getSemaforo(total) {
      if (total < 10) return 'Rojo';
      if (total <= 20) return 'Amarillo';
      return 'Verde';
    }

    function getColor(total) {
      if (total < 10) return '#E53935';
      if (total <= 20) return '#FBC02D';
      return '#43A047';
    }

    function isVisibleByFilter(feature) {
      if (!selectedDistrict) return true;
      return String(getDistrito(feature)) === String(selectedDistrict);
    }

    function styleBySection(feature) {
      const seccion = getSeccion(feature);
      const datos = getDatosSeccion(seccion);
      const total = Number(datos.total_aspirantes || 0);
      const color = datos.color || getColor(total);

      const visible = isVisibleByFilter(feature);
      const isSelected = selectedSection && String(selectedSection) === String(seccion);

      return {
        color: isSelected ? '#111827' : '#334155',
        weight: isSelected ? 3 : 1,
        fillColor: color,
        fillOpacity: visible ? (isSelected ? 0.85 : 0.52) : 0.06,
        opacity: visible ? 1 : 0.18
      };
    }

    function popupContent(props) {
      const seccion = String(props.seccion);
      const distrito = String(props.distrito_l);
      const datos = getDatosSeccion(seccion);
      const total = Number(datos.total_aspirantes || 0);
      const semaforo = datos.semaforo || getSemaforo(total);
      const color = datos.color || getColor(total);

      return `
        <div class="info-box">
          <strong>Sección ${seccion}</strong><br>
          <b>Distrito:</b> ${distrito}<br>
          <b>Aspirantes registrados:</b> ${total}<br>
          <b>Semáforo:</b> ${semaforo}<br>
          <b>Rango dominante:</b> ${datos.rango_edad_principal || 'Sin datos'}<br>
          <span class="badge" style="background:${color};">${semaforo}</span>
        </div>
      `;
    }

    function updateMainInfoForSection(seccion) {
      const datos = getDatosSeccion(seccion);
      const total = Number(datos.total_aspirantes || 0);
      const semaforo = datos.semaforo || getSemaforo(total);
      const color = datos.color || getColor(total);
      const distrito = datos.distrito_l || '';

      mainTitle.innerText = `Sección ${seccion}`;

      mainInfo.innerHTML = `
        <b>Distrito:</b> ${distrito}<br>
        <b>Aspirantes registrados:</b> ${total}<br>
        <b>Semáforo:</b> <span style="font-weight:700; color:${color};">${semaforo}</span><br>
        <b>Rango de edad dominante:</b> ${datos.rango_edad_principal || 'Sin datos'}<br><br>
        <b>Rangos de edad:</b><br>
        18 a 29: ${datos.edad_18_29 || 0}<br>
        30 a 44: ${datos.edad_30_44 || 0}<br>
        45 a 59: ${datos.edad_45_59 || 0}<br>
        60 o más: ${datos.edad_60_mas || 0}
      `;
    }

    function updateMainInfoForDistrict(distrito) {
      const visibleFeatures = geojsonDataGlobal.features.filter(f => String(f.properties.distrito_l) === String(distrito));
      const secciones = visibleFeatures.map(f => String(f.properties.seccion));
      const total = secciones.reduce((acc, seccion) => acc + Number(getDatosSeccion(seccion).total_aspirantes || 0), 0);

      let rojos = 0;
      let amarillos = 0;
      let verdes = 0;

      secciones.forEach(seccion => {
        const t = Number(getDatosSeccion(seccion).total_aspirantes || 0);
        const sem = getDatosSeccion(seccion).semaforo || getSemaforo(t);
        if (sem === 'Rojo') rojos++;
        if (sem === 'Amarillo') amarillos++;
        if (sem === 'Verde') verdes++;
      });

      mainTitle.innerText = `Distrito ${distrito}`;
      mainInfo.innerHTML = `
        <b>Secciones visibles:</b> ${secciones.length}<br>
        <b>Aspirantes registrados:</b> ${total}<br><br>
        <b>Semáforo por secciones:</b><br>
        Rojo: ${rojos}<br>
        Amarillo: ${amarillos}<br>
        Verde: ${verdes}
      `;
    }

    function updateStats() {
      if (!geojsonDataGlobal) return;

      const visibleFeatures = geojsonDataGlobal.features.filter(f => {
        if (!selectedDistrict) return true;
        return String(f.properties.distrito_l) === String(selectedDistrict);
      });

      const visibleSections = visibleFeatures.map(f => String(f.properties.seccion));
      const total = visibleSections.reduce((acc, seccion) => {
        return acc + Number(getDatosSeccion(seccion).total_aspirantes || 0);
      }, 0);

      totalSeccionesEl.innerText = visibleSections.length;
      totalAspirantesEl.innerText = total;
    }

    function refreshLayerStyles() {
      if (!geojsonLayer) return;

      geojsonLayer.eachLayer(layer => {
        layer.setStyle(styleBySection(layer.feature));
      });
    }

    function fitVisibleBounds() {
      if (!geojsonLayer) return;

      let bounds = null;

      geojsonLayer.eachLayer(layer => {
        if (isVisibleByFilter(layer.feature)) {
          if (!bounds) {
            bounds = layer.getBounds();
          } else {
            bounds.extend(layer.getBounds());
          }
        }
      });

      if (bounds) {
        map.fitBounds(bounds, { padding: [25, 25] });
      }
    }

    function populateSections() {
      if (!geojsonDataGlobal) return;

      const features = geojsonDataGlobal.features.filter(f => {
        if (!selectedDistrict) return true;
        return String(f.properties.distrito_l) === String(selectedDistrict);
      });

      const secciones = [...new Set(features.map(f => String(f.properties.seccion)).filter(Boolean))]
        .sort((a, b) => Number(a) - Number(b));

      sectionSelect.innerHTML = '<option value="">Selecciona una sección</option>';

      secciones.forEach(seccion => {
        const datos = getDatosSeccion(seccion);
        const total = Number(datos.total_aspirantes || 0);
        const semaforo = datos.semaforo || getSemaforo(total);

        const option = document.createElement('option');
        option.value = seccion;
        option.textContent = `Sección ${seccion} - ${total} aspirantes - ${semaforo}`;
        sectionSelect.appendChild(option);
      });
    }

    function selectSection(seccion) {
      selectedSection = String(seccion);

      if (!geojsonLayer) return;

      let targetLayer = null;

      geojsonLayer.eachLayer(layer => {
        const layerSection = getSeccion(layer.feature);

        layer.setStyle(styleBySection(layer.feature));

        if (String(layerSection) === String(seccion)) {
          targetLayer = layer;
        }
      });

      if (targetLayer) {
        selectedDistrict = getDistrito(targetLayer.feature);
        districtSelect.value = selectedDistrict;
        populateSections();
        sectionSelect.value = seccion;
        refreshLayerStyles();
        targetLayer.bringToFront();
        map.fitBounds(targetLayer.getBounds(), { padding: [40, 40] });
        targetLayer.openPopup();
        updateMainInfoForSection(seccion);
        updateStats();
      }
    }

    function selectDistrict(distrito) {
      selectedDistrict = String(distrito);
      selectedSection = null;

      districtSelect.value = selectedDistrict;
      populateSections();
      sectionSelect.value = '';

      refreshLayerStyles();
      fitVisibleBounds();
      updateMainInfoForDistrict(distrito);
      updateStats();
    }

    function showAllSections() {
      selectedDistrict = '';
      selectedSection = null;

      districtSelect.value = '';
      sectionSelect.value = '';

      populateSections();
      refreshLayerStyles();

      if (geojsonLayer) {
        map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });
      }

      mainTitle.innerText = 'Mapa de aspirantes por sección';
      mainInfo.innerHTML = 'Selecciona una sección o filtra por distrito para ver aspirantes registrados, semáforo y distribución por edad.';
      updateStats();
    }

    Promise.all([
      fetch('mazatlan_secciones_5pct_wgs84.geojson').then(response => response.json()),
      fetch('secciones_aspirantes.json?v=' + Date.now()).then(response => response.json())
    ])
      .then(([geojsonData, aspirantesData]) => {
        geojsonDataGlobal = geojsonData;
        aspirantesPorSeccion = aspirantesData;

        geojsonLayer = L.geoJSON(geojsonData, {
          style: styleBySection,
          onEachFeature: function(feature, layer) {
            const props = feature.properties;
            const seccion = String(props.seccion);
            const distrito = String(props.distrito_l);

            layer.bindPopup(() => popupContent(props));

            layer.on('click', function() {
              selectedDistrict = distrito;
              districtSelect.value = distrito;
              populateSections();
              sectionSelect.value = seccion;
              selectSection(seccion);
            });
          }
        }).addTo(map);

        map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });

        const distritos = [...new Set(
          geojsonData.features
            .map(f => String(f.properties.distrito_l))
            .filter(Boolean)
        )].sort((a, b) => Number(a) - Number(b));

        districtSelect.innerHTML = '<option value="">Todos los distritos</option>';

        distritos.forEach(distrito => {
          const seccionesDistrito = geojsonData.features
            .filter(f => String(f.properties.distrito_l) === String(distrito))
            .map(f => String(f.properties.seccion));

          const total = seccionesDistrito.reduce((acc, seccion) => {
            return acc + Number(getDatosSeccion(seccion).total_aspirantes || 0);
          }, 0);

          const option = document.createElement('option');
          option.value = distrito;
          option.textContent = `Distrito ${distrito} - ${seccionesDistrito.length} secciones - ${total} aspirantes`;
          districtSelect.appendChild(option);
        });

        populateSections();
        updateStats();

        districtSelect.addEventListener('change', function() {
          if (this.value) {
            selectDistrict(this.value);
          } else {
            showAllSections();
          }
        });

        sectionSelect.addEventListener('change', function() {
          if (this.value) {
            selectSection(this.value);
          }
        });

        showAllBtn.addEventListener('click', showAllSections);

        const legend = L.control({ position: 'bottomright' });

        legend.onAdd = function () {
          const div = L.DomUtil.create('div', 'legend');
          div.innerHTML = `
            <strong>Semáforo por sección</strong><br>
            <span style="background:#E53935;"></span> Menor de 10<br>
            <span style="background:#FBC02D;"></span> 10 a 20<br>
            <span style="background:#43A047;"></span> Más de 20
          `;
          return div;
        };

        legend.addTo(map);
      })
      .catch(error => {
        districtSelect.innerHTML = '<option>Error al cargar datos</option>';
        sectionSelect.innerHTML = '<option>Error al cargar datos</option>';
        mainTitle.innerText = 'Error al cargar el mapa';
        mainInfo.innerText = 'Revisa que los archivos mazatlan_secciones_5pct_wgs84.geojson y secciones_aspirantes.json estén en el mismo repositorio.';
        console.error(error);
      });
  </script>

</body>
</html>
