<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa de Composición Electoral 2024 - Mazatlán</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    #panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: white;
      width: 340px;
      padding: 14px;
      border-radius: 12px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.25);
      max-height: 92vh;
      overflow-y: auto;
    }

    h2 {
      margin: 0 0 6px 0;
      font-size: 17px;
      color: #111827;
    }

    .subtitulo {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-top: 9px;
      font-size: 12px;
      font-weight: bold;
      color: #374151;
    }

    select, input {
      width: 100%;
      padding: 7px;
      margin-top: 4px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 13px;
      box-sizing: border-box;
    }

    #resumen {
      margin-top: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 9px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.45;
      color: #374151;
    }

    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.25);
      font-size: 12px;
      line-height: 18px;
    }

    .legend span {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 6px;
      border: 1px solid #777;
      vertical-align: middle;
    }
  </style>
</head>

<body>

<div id="panel">
  <h2>Composición electoral 2024</h2>
  <div class="subtitulo">Mazatlán · Secciones electorales · Edad, participación e índices</div>

  <label>Ver mapa por</label>
  <select id="variableMapa">
    <option value="Indice_Oportunidad_0_100">Índice de oportunidad</option>
    <option value="Participacion_Seccion">Participación de la sección</option>
    <option value="No_Voto_Total">No voto total</option>
    <option value="Potencial_Movilizacion_vs_Municipal">Potencial de movilización</option>
    <option value="HHI_Grupos_Edad_0_100">HHI / concentración por edad</option>
    <option value="Entropia_Grupos_Edad_0_100">Entropía / diversidad por edad</option>
    <option value="Cramer_V_Grupos_Edad">Cramer V por edad</option>
    <option value="Brecha_Max_Min_Participacion_Grupos">Brecha entre grupos de edad</option>
    <option value="Indice_Segmentacion_Edad_0_100">Índice de segmentación por edad</option>
    <option value="Indice_Dominancia_Grupo_0_100">Dominancia del grupo principal</option>
  </select>

  <label>Nivel de oportunidad</label>
  <select id="filtroOportunidad">
    <option value="">Todos</option>
    <option value="Alta">Alta</option>
    <option value="Media">Media</option>
    <option value="Seguimiento">Seguimiento</option>
    <option value="Baja">Baja</option>
  </select>

  <label>Tipo de composición por edad</label>
  <select id="filtroComposicion">
    <option value="">Todos</option>
    <option value="Concentrada">Concentrada</option>
    <option value="Media">Media</option>
    <option value="Diversificada">Diversificada</option>
  </select>

  <label>Fuerza de diferencia por edad</label>
  <select id="filtroFuerza">
    <option value="">Todos</option>
    <option value="Alta">Alta</option>
    <option value="Media">Media</option>
    <option value="Baja">Baja</option>
    <option value="No evaluable">No evaluable</option>
  </select>

  <label>Grupo dominante en votos</label>
  <select id="filtroDominante">
    <option value="">Todos</option>
    <option value="18-29">18-29</option>
    <option value="30-39">30-39</option>
    <option value="40-49">40-49</option>
    <option value="50-59">50-59</option>
    <option value="60-79">60-79</option>
    <option value="80+">80+</option>
  </select>

  <label>Grupo con mayor no voto</label>
  <select id="filtroNoVoto">
    <option value="">Todos</option>
    <option value="18-29">18-29</option>
    <option value="30-39">30-39</option>
    <option value="40-49">40-49</option>
    <option value="50-59">50-59</option>
    <option value="60-79">60-79</option>
    <option value="80+">80+</option>
  </select>

  <label>Universo operativo</label>
  <select id="filtroUniverso">
    <option value="">Todos</option>
    <option value="Operativa">Operativa</option>
    <option value="Pequeña / revisar con cuidado">Pequeña / revisar con cuidado</option>
  </select>

  <label>Buscar sección</label>
  <input id="buscarSeccion" placeholder="Ej. 2618">

  <div id="resumen">Cargando información...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([23.24, -106.41], 11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "© OpenStreetMap"
}).addTo(map);

let geojsonData = null;
let capa = null;
let datos = {};
let legend = null;

const configVariables = {
  Indice_Oportunidad_0_100: {
    nombre: "Índice de oportunidad",
    formato: "numero",
    colores: ["#eff6ff", "#bfdbfe", "#60a5fa", "#2563eb", "#1e3a8a"]
  },
  Participacion_Seccion: {
    nombre: "Participación de la sección",
    formato: "porcentaje",
    colores: ["#fee2e2", "#fecaca", "#f87171", "#dc2626", "#7f1d1d"]
  },
  No_Voto_Total: {
    nombre: "No voto total",
    formato: "entero",
    colores: ["#fef9c3", "#fde68a", "#f59e0b", "#d97706", "#78350f"]
  },
  Potencial_Movilizacion_vs_Municipal: {
    nombre: "Potencial de movilización",
    formato: "entero",
    colores: ["#f3e8ff", "#d8b4fe", "#a855f7", "#7e22ce", "#581c87"]
  },
  HHI_Grupos_Edad_0_100: {
    nombre: "HHI / concentración por edad",
    formato: "numero",
    colores: ["#ecfdf5", "#bbf7d0", "#4ade80", "#16a34a", "#14532d"]
  },
  Entropia_Grupos_Edad_0_100: {
    nombre: "Entropía / diversidad por edad",
    formato: "numero",
    colores: ["#f0fdfa", "#99f6e4", "#2dd4bf", "#0f766e", "#134e4a"]
  },
  Cramer_V_Grupos_Edad: {
    nombre: "Cramer V por edad",
    formato: "numero",
    colores: ["#f9fafb", "#d1d5db", "#9ca3af", "#4b5563", "#111827"]
  },
  Brecha_Max_Min_Participacion_Grupos: {
    nombre: "Brecha entre grupos de edad",
    formato: "porcentaje",
    colores: ["#fefce8", "#fef08a", "#eab308", "#a16207", "#713f12"]
  },
  Indice_Segmentacion_Edad_0_100: {
    nombre: "Índice de segmentación por edad",
    formato: "numero",
    colores: ["#eef2ff", "#c7d2fe", "#818cf8", "#4f46e5", "#312e81"]
  },
  Indice_Dominancia_Grupo_0_100: {
    nombre: "Dominancia del grupo principal",
    formato: "numero",
    colores: ["#fff7ed", "#fed7aa", "#fb923c", "#ea580c", "#7c2d12"]
  }
};

function normalizarSeccion(x) {
  if (x === undefined || x === null) return "";
  return String(x).replace(".0", "").trim();
}

function obtenerSeccionGeojson(props) {
  const posibles = [
    "SECCION", "seccion", "Seccion", "SECCIÓN", "Sección",
    "CVE_SECC", "CVESECC", "SECC", "secc", "id", "ID"
  ];

  for (const k of posibles) {
    if (props[k] !== undefined && props[k] !== null) {
      return normalizarSeccion(props[k]);
    }
  }

  for (const k in props) {
    if (k.toLowerCase().includes("secc")) {
      return normalizarSeccion(props[k]);
    }
  }

  return "";
}

function valor(d, campo) {
  if (!d) return null;
  const v = d[campo];
  if (v === undefined || v === null || v === "") return null;
  const n = Number(v);
  return isNaN(n) ? v : n;
}

function formato(v, tipo) {
  if (v === undefined || v === null || v === "" || Number.isNaN(v)) return "Sin dato";

  if (tipo === "porcentaje") {
    return (Number(v) * 100).toFixed(2) + "%";
  }

  if (tipo === "entero") {
    return Math.round(Number(v)).toLocaleString("es-MX");
  }

  if (typeof v === "number") {
    return Number(v).toFixed(2);
  }

  return v;
}

function valoresVariable(variable) {
  return Object.values(datos)
    .map(d => Number(d[variable]))
    .filter(v => !isNaN(v));
}

function colorPorValor(v, variable) {
  if (v === null || v === undefined || isNaN(Number(v))) return "#d1d5db";

  const valores = valoresVariable(variable);
  if (valores.length === 0) return "#d1d5db";

  const min = Math.min(...valores);
  const max = Math.max(...valores);

  if (max === min) return configVariables[variable].colores[2];

  const t = (Number(v) - min) / (max - min);
  const c = configVariables[variable].colores;

  if (t <= 0.20) return c[0];
  if (t <= 0.40) return c[1];
  if (t <= 0.60) return c[2];
  if (t <= 0.80) return c[3];
  return c[4];
}

function pasaFiltros(d) {
  if (!d) return false;

  const oportunidad = document.getElementById("filtroOportunidad").value;
  const composicion = document.getElementById("filtroComposicion").value;
  const fuerza = document.getElementById("filtroFuerza").value;
  const dominante = document.getElementById("filtroDominante").value;
  const noVoto = document.getElementById("filtroNoVoto").value;
  const universo = document.getElementById("filtroUniverso").value;
  const buscar = document.getElementById("buscarSeccion").value.trim();

  if (oportunidad && d.Nivel_Oportunidad !== oportunidad) return false;
  if (composicion && d.Tipo_Composicion_Edad !== composicion) return false;
  if (fuerza && d.Fuerza_Diferencia_Edad !== fuerza) return false;
  if (dominante && d.Grupo_Dominante_Votos !== dominante) return false;
  if (noVoto && d.Grupo_Mayor_No_Voto !== noVoto) return false;
  if (universo && d.Universo_Operativo !== universo) return false;
  if (buscar && normalizarSeccion(d.SECCION) !== buscar) return false;

  return true;
}

function estilo(feature) {
  const seccion = obtenerSeccionGeojson(feature.properties);
  const d = datos[seccion];
  const variable = document.getElementById("variableMapa").value;

  if (!pasaFiltros(d)) {
    return {
      color: "#9ca3af",
      weight: 0.5,
      fillColor: "#e5e7eb",
      fillOpacity: 0.08
    };
  }

  const v = valor(d, variable);

  return {
    color: "#374151",
    weight: 0.8,
    fillColor: colorPorValor(v, variable),
    fillOpacity: 0.78
  };
}

function popup(feature) {
  const seccion = obtenerSeccionGeojson(feature.properties);
  const d = datos[seccion];

  if (!d) {
    return `<b>Sección ${seccion}</b><br>Sin datos de composición electoral.`;
  }

  return `
    <div style="font-size:13px; min-width:270px; line-height:1.35;">
      <b>Sección ${seccion}</b><br><br>

      <b>Base electoral</b><br>
      Lista nominal: ${formato(valor(d, "Lista_Nominal"), "entero")}<br>
      Votantes: ${formato(valor(d, "Votantes"), "entero")}<br>
      No voto total: ${formato(valor(d, "No_Voto_Total"), "entero")}<br>
      Participación: ${formato(valor(d, "Participacion_Seccion"), "porcentaje")}<br><br>

      <b>Oportunidad</b><br>
      Índice: ${formato(valor(d, "Indice_Oportunidad_0_100"), "numero")}<br>
      Nivel: ${d.Nivel_Oportunidad || "Sin dato"}<br>
      Potencial movilización: ${formato(valor(d, "Potencial_Movilizacion_vs_Municipal"), "entero")}<br><br>

      <b>Composición por edad</b><br>
      Grupo dominante en votos: ${d.Grupo_Dominante_Votos || "Sin dato"}<br>
      Grupo con mayor no voto: ${d.Grupo_Mayor_No_Voto || "Sin dato"}<br>
      Grupo con mayor participación: ${d.Grupo_Mayor_Participacion || "Sin dato"}<br>
      Grupo con menor participación: ${d.Grupo_Menor_Participacion || "Sin dato"}<br><br>

      <b>Índices</b><br>
      HHI edad: ${formato(valor(d, "HHI_Grupos_Edad_0_100"), "numero")}<br>
      Entropía edad: ${formato(valor(d, "Entropia_Grupos_Edad_0_100"), "numero")}<br>
      Cramer V edad: ${formato(valor(d, "Cramer_V_Grupos_Edad"), "numero")}<br>
      Brecha edad: ${formato(valor(d, "Brecha_Max_Min_Participacion_Grupos"), "porcentaje")}<br><br>

      <b>Lectura</b><br>
      ${d.Recomendacion || "Sin recomendación"}
    </div>
  `;
}

function actualizarMapa() {
  if (!geojsonData) return;

  if (capa) {
    map.removeLayer(capa);
  }

  capa = L.geoJSON(geojsonData, {
    style: estilo,
    onEachFeature: function(feature, layer) {
      layer.bindPopup(popup(feature));

      layer.on("mouseover", function() {
        layer.setStyle({
          weight: 2,
          color: "#111827"
        });
      });

      layer.on("mouseout", function() {
        capa.resetStyle(layer);
      });
    }
  }).addTo(map);

  actualizarResumen();
  actualizarLeyenda();
}

function actualizarResumen() {
  let total = 0;
  let visibles = 0;
  let ln = 0;
  let votos = 0;
  let noVoto = 0;

  Object.values(datos).forEach(d => {
    total += 1;

    if (pasaFiltros(d)) {
      visibles += 1;
      ln += Number(d.Lista_Nominal || 0);
      votos += Number(d.Votantes || 0);
      noVoto += Number(d.No_Voto_Total || 0);
    }
  });

  const participacion = ln > 0 ? votos / ln : null;
  const variable = document.getElementById("variableMapa").value;

  document.getElementById("resumen").innerHTML = `
    <b>Variable activa:</b> ${configVariables[variable].nombre}<br>
    <b>Secciones visibles:</b> ${visibles} de ${total}<br>
    <b>Lista nominal visible:</b> ${ln.toLocaleString("es-MX")}<br>
    <b>Votantes visibles:</b> ${votos.toLocaleString("es-MX")}<br>
    <b>No voto visible:</b> ${noVoto.toLocaleString("es-MX")}<br>
    <b>Participación visible:</b> ${participacion === null ? "Sin dato" : (participacion * 100).toFixed(2) + "%"}
  `;
}

function actualizarLeyenda() {
  const variable = document.getElementById("variableMapa").value;
  const cfg = configVariables[variable];
  const valores = valoresVariable(variable);

  if (legend) {
    map.removeControl(legend);
  }

  legend = L.control({ position: "bottomright" });

  legend.onAdd = function() {
    const div = L.DomUtil.create("div", "legend");

    if (valores.length === 0) {
      div.innerHTML = "<b>Sin datos</b>";
      return div;
    }

    const min = Math.min(...valores);
    const max = Math.max(...valores);
    const colores = cfg.colores;

    div.innerHTML = `<b>${cfg.nombre}</b><br>`;

    for (let i = 0; i < 5; i++) {
      const a = min + (max - min) * (i / 5);
      const b = min + (max - min) * ((i + 1) / 5);

      div.innerHTML += `
        <span style="background:${colores[i]}"></span>
        ${formato(a, cfg.formato)} - ${formato(b, cfg.formato)}<br>
      `;
    }

    return div;
  };

  legend.addTo(map);
}

Promise.all([
  fetch("./mazatlan_secciones_5pct_wgs84.geojson").then(r => r.json()),
  fetch("./composicion_2024_indices.json").then(r => r.json())
])
.then(([geojson, indices]) => {
  geojsonData = geojson;

  indices.forEach(d => {
    datos[normalizarSeccion(d.SECCION)] = d;
  });

  actualizarMapa();

  const bounds = L.geoJSON(geojsonData).getBounds();
  map.fitBounds(bounds);
})
.catch(error => {
  console.error(error);
  document.getElementById("resumen").innerHTML = `
    <b>Error cargando archivos.</b><br>
    Revisa que estén en la misma carpeta:<br>
    composicion_2024_indices.json<br>
    mazatlan_secciones_5pct_wgs84.geojson
  `;
});

[
  "variableMapa",
  "filtroOportunidad",
  "filtroComposicion",
  "filtroFuerza",
  "filtroDominante",
  "filtroNoVoto",
  "filtroUniverso",
  "buscarSeccion"
].forEach(id => {
  document.getElementById(id).addEventListener("change", actualizarMapa);
  document.getElementById(id).addEventListener("keyup", actualizarMapa);
});
</script>

</body>
</html>
