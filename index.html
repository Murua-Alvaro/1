<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa de aspirantes por sección - Mazatlán</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
    }

    .panel {
      max-width: 1280px;
      margin: 24px auto 16px;
      padding: 0 18px;
      display: grid;
      grid-template-columns: 0.8fr 1.4fr;
      gap: 18px;
      align-items: stretch;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.1;
      color: #111827;
    }

    p {
      margin: 0;
      color: #475467;
      font-size: 15px;
      line-height: 1.5;
    }

    label {
      font-weight: 800;
      display: block;
      margin-bottom: 10px;
      color: #111827;
      font-size: 20px;
    }

    select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #d0d5dd;
      font-size: 18px;
      background: white;
      margin-bottom: 14px;
      outline: none;
    }

    select:focus {
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.10);
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 800;
      font-size: 15px;
      background: #111827;
      color: white;
    }

    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    #map {
      max-width: 1280px;
      height: 780px;
      margin: 0 auto 28px;
      border: 1px solid #d0d5dd;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
    }

    .info-box {
      font-size: 15px;
      line-height: 1.55;
    }

    .info-box strong {
      font-size: 18px;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      color: white;
      font-weight: 800;
      font-size: 12px;
      margin-top: 6px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .summary-item {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
    }

    .summary-item b {
      display: block;
      font-size: 24px;
      color: #111827;
      margin-bottom: 2px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .detail {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
      font-size: 14px;
    }

    .detail b {
      display: block;
      font-size: 20px;
      color: #111827;
      margin-bottom: 2px;
    }

    .legend {
      background: white;
      padding: 12px 14px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      font-size: 13px;
      line-height: 1.6;
    }

    .legend span {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: middle;
    }

    @media (max-width: 1000px) {
      .panel {
        grid-template-columns: 1fr;
      }

      #map {
        height: 650px;
        border-radius: 0;
      }

      .summary,
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="panel">
    <div class="card">
      <label for="sectionSelect">Seleccionar sección</label>
      <select id="sectionSelect">
        <option value="">Cargando secciones...</option>
      </select>

      <div class="actions">
        <button id="showAllBtn" class="secondary">Ver todas las secciones</button>
      </div>

      <div class="summary">
        <div class="summary-item">
          <b id="totalSecciones">-</b>
          Secciones
        </div>
        <div class="summary-item">
          <b id="totalAspirantes">-</b>
          Aspirantes
        </div>
      </div>
    </div>

    <div class="card">
      <h1 id="mainTitle">Mapa de aspirantes por sección</h1>
      <p id="mainInfo">
        Selecciona una sección para ver aspirantes registrados, semáforo y distribución por edad.
      </p>

      <div class="detail-grid" id="detailGrid" style="display:none;">
        <div class="detail">
          <b id="edad18">0</b>
          18 a 29
        </div>
        <div class="detail">
          <b id="edad30">0</b>
          30 a 44
        </div>
        <div class="detail">
          <b id="edad45">0</b>
          45 a 59
        </div>
        <div class="detail">
          <b id="edad60">0</b>
          60 o más
        </div>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([23.245, -106.41], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let geojsonLayer;
    let selectedSection = null;
    let aspirantesPorSeccion = {};
    let geojsonDataGlobal = null;

    const sectionSelect = document.getElementById('sectionSelect');
    const showAllBtn = document.getElementById('showAllBtn');
    const mainTitle = document.getElementById('mainTitle');
    const mainInfo = document.getElementById('mainInfo');
    const totalSeccionesEl = document.getElementById('totalSecciones');
    const totalAspirantesEl = document.getElementById('totalAspirantes');
    const detailGrid = document.getElementById('detailGrid');
    const edad18 = document.getElementById('edad18');
    const edad30 = document.getElementById('edad30');
    const edad45 = document.getElementById('edad45');
    const edad60 = document.getElementById('edad60');

    function getSeccion(feature) {
      return String(feature.properties.seccion);
    }

    function getDistrito(feature) {
      return String(feature.properties.distrito_l);
    }

    function getDatosSeccion(seccion) {
      return aspirantesPorSeccion[String(seccion)] || {
        total_aspirantes: 0,
        semaforo: 'Rojo',
        color: '#E53935',
        rango_edad_principal: 'Sin datos',
        edad_18_29: 0,
        edad_30_44: 0,
        edad_45_59: 0,
        edad_60_mas: 0
      };
    }

    function getSemaforo(total) {
      if (total < 10) return 'Rojo';
      if (total <= 20) return 'Amarillo';
      return 'Verde';
    }

    function getColor(total) {
      if (total < 10) return '#E53935';
      if (total <= 20) return '#FBC02D';
      return '#43A047';
    }

    function styleBySection(feature) {
      const seccion = getSeccion(feature);
      const datos = getDatosSeccion(seccion);
      const total = Number(datos.total_aspirantes || 0);
      const color = datos.color || getColor(total);
      const isSelected = selectedSection && String(selectedSection) === String(seccion);

      return {
        color: isSelected ? '#111827' : '#334155',
        weight: isSelected ? 4 : 1,
        fillColor: color,
        fillOpacity: isSelected ? 0.88 : 0.52,
        opacity: 1
      };
    }

    function popupContent(props) {
      const seccion = String(props.seccion);
      const distrito = String(props.distrito_l);
      const datos = getDatosSeccion(seccion);
      const total = Number(datos.total_aspirantes || 0);
      const semaforo = datos.semaforo || getSemaforo(total);
      const color = datos.color || getColor(total);

      return `
        <div class="info-box">
          <strong>Sección ${seccion}</strong><br>
          <b>Distrito:</b> ${distrito}<br>
          <b>Aspirantes registrados:</b> ${total}<br>
          <b>Semáforo:</b> ${semaforo}<br>
          <b>Rango dominante:</b> ${datos.rango_edad_principal || 'Sin datos'}<br>
          <span class="badge" style="background:${color};">${semaforo}</span>
        </div>
      `;
    }

    function updateStats() {
      if (!geojsonDataGlobal) return;

      const secciones = geojsonDataGlobal.features
        .map(f => String(f.properties.seccion))
        .filter(Boolean);

      const total = secciones.reduce((acc, seccion) => {
        return acc + Number(getDatosSeccion(seccion).total_aspirantes || 0);
      }, 0);

      totalSeccionesEl.innerText = secciones.length;
      totalAspirantesEl.innerText = total;
    }

    function updateInfoForSection(seccion) {
      const datos = getDatosSeccion(seccion);
      const total = Number(datos.total_aspirantes || 0);
      const semaforo = datos.semaforo || getSemaforo(total);
      const color = datos.color || getColor(total);
      const distrito = datos.distrito_l || '';

      mainTitle.innerText = `Sección ${seccion}`;

      mainInfo.innerHTML = `
        <b>Distrito:</b> ${distrito}<br>
        <b>Aspirantes registrados:</b> ${total}<br>
        <b>Semáforo:</b> <span style="font-weight:800; color:${color};">${semaforo}</span><br>
        <b>Rango de edad dominante:</b> ${datos.rango_edad_principal || 'Sin datos'}
      `;

      edad18.innerText = datos.edad_18_29 || 0;
      edad30.innerText = datos.edad_30_44 || 0;
      edad45.innerText = datos.edad_45_59 || 0;
      edad60.innerText = datos.edad_60_mas || 0;

      detailGrid.style.display = 'grid';
    }

    function refreshLayerStyles() {
      if (!geojsonLayer) return;

      geojsonLayer.eachLayer(layer => {
        layer.setStyle(styleBySection(layer.feature));
      });
    }

    function scrollToMap() {
      document.getElementById('map').scrollIntoView({
        behavior: 'smooth',
        block: 'start'
      });
    }

    function selectSection(seccion) {
      selectedSection = String(seccion);

      if (!geojsonLayer) return;

      let targetLayer = null;

      geojsonLayer.eachLayer(layer => {
        const layerSection = getSeccion(layer.feature);

        layer.setStyle(styleBySection(layer.feature));

        if (String(layerSection) === String(seccion)) {
          targetLayer = layer;
        }
      });

      if (targetLayer) {
        targetLayer.bringToFront();
        updateInfoForSection(seccion);
        refreshLayerStyles();

        setTimeout(() => {
          scrollToMap();
          map.fitBounds(targetLayer.getBounds(), { padding: [45, 45] });
          targetLayer.openPopup();
        }, 150);
      }
    }

    function showAllSections() {
      selectedSection = null;
      sectionSelect.value = '';

      refreshLayerStyles();

      if (geojsonLayer) {
        map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });
      }

      mainTitle.innerText = 'Mapa de aspirantes por sección';
      mainInfo.innerHTML = 'Selecciona una sección para ver aspirantes registrados, semáforo y distribución por edad.';
      detailGrid.style.display = 'none';

      updateStats();
      scrollToMap();
    }

    Promise.all([
      fetch('mazatlan_secciones_5pct_wgs84.geojson').then(response => response.json()),
      fetch('secciones_aspirantes.json?v=' + Date.now()).then(response => response.json())
    ])
      .then(([geojsonData, aspirantesData]) => {
        geojsonDataGlobal = geojsonData;
        aspirantesPorSeccion = aspirantesData;

        geojsonLayer = L.geoJSON(geojsonData, {
          style: styleBySection,
          onEachFeature: function(feature, layer) {
            const props = feature.properties;
            const seccion = String(props.seccion);

            layer.bindPopup(() => popupContent(props));

            layer.on('click', function() {
              sectionSelect.value = seccion;
              selectSection(seccion);
            });
          }
        }).addTo(map);

        map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });

        const secciones = [...new Set(
          geojsonData.features
            .map(f => String(f.properties.seccion))
            .filter(Boolean)
        )].sort((a, b) => Number(a) - Number(b));

        sectionSelect.innerHTML = '<option value="">Selecciona una sección</option>';

        secciones.forEach(seccion => {
          const option = document.createElement('option');
          option.value = seccion;
          option.textContent = `Sección ${seccion}`;
          sectionSelect.appendChild(option);
        });

        updateStats();

        sectionSelect.addEventListener('change', function() {
          if (this.value) {
            selectSection(this.value);
          }
        });

        showAllBtn.addEventListener('click', showAllSections);

        const legend = L.control({ position: 'bottomright' });

        legend.onAdd = function () {
          const div = L.DomUtil.create('div', 'legend');
          div.innerHTML = `
            <strong>Semáforo por sección</strong><br>
            <span style="background:#E53935;"></span> Menor de 10<br>
            <span style="background:#FBC02D;"></span> 10 a 20<br>
            <span style="background:#43A047;"></span> Más de 20
          `;
          return div;
        };

        legend.addTo(map);
      })
      .catch(error => {
        sectionSelect.innerHTML = '<option>Error al cargar datos</option>';
        mainTitle.innerText = 'Error al cargar el mapa';
        mainInfo.innerText = 'Revisa que los archivos mazatlan_secciones_5pct_wgs84.geojson y secciones_aspirantes.json estén en el mismo repositorio.';
        console.error(error);
      });
  </script>

</body>
</html>
