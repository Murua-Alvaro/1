<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa de Composición Electoral 2024 - Mazatlán</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    #panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: white;
      width: 330px;
      padding: 14px;
      border-radius: 12px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.25);
      max-height: 92vh;
      overflow-y: auto;
    }

    #panel h2 {
      margin: 0;
      font-size: 17px;
      color: #111827;
    }

    #panel .sub {
      font-size: 12px;
      color: #6b7280;
      margin: 4px 0 12px 0;
      line-height: 1.3;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 12px;
      font-weight: bold;
      color: #374151;
    }

    select, input {
      width: 100%;
      padding: 7px;
      margin-top: 4px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 13px;
      box-sizing: border-box;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #resumen {
      margin-top: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.45;
      color: #374151;
    }

    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.25);
      font-size: 12px;
      line-height: 18px;
    }

    .legend span {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 6px;
      border: 1px solid #777;
      vertical-align: middle;
    }

    .popup-box {
      font-size: 13px;
      line-height: 1.35;
      min-width: 320px;
      max-width: 390px;
    }

    .popup-box h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
      color: #111827;
    }

    .popup-section {
      margin-top: 9px;
      padding-top: 7px;
      border-top: 1px solid #e5e7eb;
    }

    .popup-section b {
      color: #111827;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 2px 0;
    }

    .row span:first-child {
      color: #4b5563;
    }

    .row span:last-child {
      font-weight: bold;
      color: #111827;
      text-align: right;
    }

    .peso-voto-grid {
      margin-top: 6px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .peso-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      padding: 6px 8px;
    }

    .peso-card .grupo {
      font-size: 11px;
      color: #6b7280;
      font-weight: bold;
    }

    .peso-card .valor {
      font-size: 15px;
      color: #111827;
      font-weight: bold;
      margin-top: 2px;
    }
  </style>
</head>

<body>

<div id="panel">
  <h2>Composición electoral 2024</h2>
  <div class="sub">Mazatlán · Secciones electorales · Participación, no voto, HHI, Cramer V y oportunidad</div>

  <label>Ver mapa por</label>
  <select id="variableMapa">
    <option value="Indice_Oportunidad_0_100">Índice de oportunidad</option>
    <option value="HHI_Grupos_Edad_0_100">HHI / concentración por edad</option>
    <option value="Cramer_V_Grupos_Edad">Cramer V por edad</option>
    <option value="Tipo_Composicion_Edad">Tipo de composición</option>
  </select>

  <label>Filtro: oportunidad</label>
  <select id="filtroOportunidad">
    <option value="">Todas</option>
    <option value="Alta">Alta</option>
    <option value="Media">Media</option>
    <option value="Seguimiento">Seguimiento</option>
    <option value="Baja">Baja</option>
  </select>

  <label>Filtro: HHI</label>
  <select id="filtroHHI">
    <option value="">Todos</option>
    <option value="bajo">Bajo</option>
    <option value="medio">Medio</option>
    <option value="alto">Alto</option>
  </select>

  <label>Filtro: Cramer V</label>
  <select id="filtroCramer">
    <option value="">Todos</option>
    <option value="bajo">Bajo</option>
    <option value="medio">Medio</option>
    <option value="alto">Alto</option>
  </select>

  <label>Filtro: tipo de composición</label>
  <select id="filtroComposicion">
    <option value="">Todas</option>
    <option value="Concentrada">Concentrada</option>
    <option value="Media">Media</option>
    <option value="Diversificada">Diversificada</option>
  </select>

  <label>Buscar sección</label>
  <input id="buscarSeccion" placeholder="Ej. 2618">

  <button onclick="limpiarFiltros()">Limpiar filtros</button>

  <div id="resumen">Cargando información...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([23.24, -106.41], 11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "© OpenStreetMap"
}).addTo(map);

let geojsonData = null;
let capa = null;
let datos = {};
let datosArray = [];
let legend = null;
let capasPorSeccion = {};

const coloresContinuos = {
  Indice_Oportunidad_0_100: ["#eff6ff", "#bfdbfe", "#60a5fa", "#2563eb", "#1e3a8a"],
  HHI_Grupos_Edad_0_100: ["#f0fdf4", "#bbf7d0", "#4ade80", "#16a34a", "#14532d"],
  Cramer_V_Grupos_Edad: ["#f9fafb", "#d1d5db", "#9ca3af", "#4b5563", "#111827"]
};

const coloresComposicion = {
  "Concentrada": "#dc2626",
  "Media": "#f59e0b",
  "Diversificada": "#16a34a",
  "Sin dato": "#cbd5e1"
};

const nombresVariable = {
  Indice_Oportunidad_0_100: "Índice de oportunidad",
  HHI_Grupos_Edad_0_100: "HHI / concentración por edad",
  Cramer_V_Grupos_Edad: "Cramer V por edad",
  Tipo_Composicion_Edad: "Tipo de composición"
};

function normalizarSeccion(x) {
  if (x === undefined || x === null) return "";
  return String(x).replace(".0", "").trim();
}

function obtenerSeccionGeojson(props) {
  const posibles = ["SECCION", "seccion", "Seccion", "CVE_SECC", "CVESECC", "SECC", "secc", "id", "ID"];

  for (const k of posibles) {
    if (props[k] !== undefined && props[k] !== null) {
      return normalizarSeccion(props[k]);
    }
  }

  for (const k in props) {
    if (k.toLowerCase().includes("secc")) {
      return normalizarSeccion(props[k]);
    }
  }

  return "";
}

function num(v) {
  if (v === undefined || v === null || v === "") return null;
  const n = Number(v);
  return isNaN(n) ? null : n;
}

function txt(v) {
  if (v === undefined || v === null || v === "") return "Sin dato";
  return String(v);
}

function fmt(v, tipo) {
  if (v === undefined || v === null || v === "" || Number.isNaN(v)) return "Sin dato";

  if (tipo === "porcentaje") {
    return (Number(v) * 100).toFixed(2) + "%";
  }

  if (tipo === "entero") {
    return Math.round(Number(v)).toLocaleString("es-MX");
  }

  if (tipo === "numero") {
    return Number(v).toFixed(2);
  }

  return String(v);
}

function percentil(arr, p) {
  const valores = arr.filter(v => v !== null && !isNaN(v)).sort((a,b) => a-b);
  if (valores.length === 0) return null;

  const pos = (valores.length - 1) * p;
  const base = Math.floor(pos);
  const resto = pos - base;

  if (valores[base + 1] !== undefined) {
    return valores[base] + resto * (valores[base + 1] - valores[base]);
  }

  return valores[base];
}

function clasificarTercil(valor, campo) {
  const v = num(valor);
  if (v === null) return "sin";

  const valores = datosArray.map(d => num(d[campo])).filter(x => x !== null);
  const p33 = percentil(valores, 0.3333);
  const p66 = percentil(valores, 0.6666);

  if (v <= p33) return "bajo";
  if (v <= p66) return "medio";
  return "alto";
}

function valoresCampo(campo) {
  return datosArray.map(d => num(d[campo])).filter(v => v !== null);
}

function colorContinuo(valor, campo) {
  const v = num(valor);
  if (v === null) return "#cbd5e1";

  const valores = valoresCampo(campo);
  const colores = coloresContinuos[campo];

  if (!colores || valores.length === 0) return "#cbd5e1";

  const min = Math.min(...valores);
  const max = Math.max(...valores);

  if (min === max) return colores[2];

  const t = (v - min) / (max - min);

  if (t <= 0.20) return colores[0];
  if (t <= 0.40) return colores[1];
  if (t <= 0.60) return colores[2];
  if (t <= 0.80) return colores[3];
  return colores[4];
}

function colorFeature(d) {
  const variable = document.getElementById("variableMapa").value;

  if (!d) return "#e5e7eb";

  if (variable === "Tipo_Composicion_Edad") {
    const tipo = txt(d.Tipo_Composicion_Edad);
    return coloresComposicion[tipo] || coloresComposicion["Sin dato"];
  }

  return colorContinuo(d[variable], variable);
}

function pasaFiltros(d) {
  if (!d) return false;

  const fOportunidad = document.getElementById("filtroOportunidad").value;
  const fHHI = document.getElementById("filtroHHI").value;
  const fCramer = document.getElementById("filtroCramer").value;
  const fComposicion = document.getElementById("filtroComposicion").value;

  if (fOportunidad && txt(d.Nivel_Oportunidad) !== fOportunidad) return false;
  if (fComposicion && txt(d.Tipo_Composicion_Edad) !== fComposicion) return false;

  if (fHHI && clasificarTercil(d.HHI_Grupos_Edad_0_100, "HHI_Grupos_Edad_0_100") !== fHHI) return false;
  if (fCramer && clasificarTercil(d.Cramer_V_Grupos_Edad, "Cramer_V_Grupos_Edad") !== fCramer) return false;

  return true;
}

function estilo(feature) {
  const seccion = obtenerSeccionGeojson(feature.properties);
  const d = datos[seccion];

  if (!pasaFiltros(d)) {
    return {
      color: "#9ca3af",
      weight: 0.5,
      fillColor: "#e5e7eb",
      fillOpacity: 0.10
    };
  }

  return {
    color: "#374151",
    weight: 0.75,
    fillColor: colorFeature(d),
    fillOpacity: 0.78
  };
}

function linea(nombre, valor) {
  return `<div class="row"><span>${nombre}</span><span>${valor}</span></div>`;
}

function pesoCard(grupo, valor) {
  return `
    <div class="peso-card">
      <div class="grupo">${grupo}</div>
      <div class="valor">${fmt(num(valor), "porcentaje")}</div>
    </div>
  `;
}

function popupHTML(seccion, d) {
  if (!d) {
    return `<div class="popup-box"><h3>Sección ${seccion}</h3>Sin datos de composición electoral.</div>`;
  }

  return `
    <div class="popup-box">
      <h3>Sección ${seccion}</h3>

      <div class="popup-section">
        <b>Base electoral</b>
        ${linea("Lista nominal", fmt(num(d.Lista_Nominal), "entero"))}
        ${linea("Votantes", fmt(num(d.Votantes), "entero"))}
        ${linea("No voto total", fmt(num(d.No_Voto_Total), "entero"))}
        ${linea("Participación", fmt(num(d.Participacion_Seccion), "porcentaje"))}
        ${linea("Abstención", fmt(num(d.Abstencion_Seccion), "porcentaje"))}
      </div>

      <div class="popup-section">
        <b>Oportunidad territorial</b>
        ${linea("Índice de oportunidad", fmt(num(d.Indice_Oportunidad_0_100), "numero"))}
        ${linea("Nivel", txt(d.Nivel_Oportunidad))}
        ${linea("Potencial movilización", fmt(num(d.Potencial_Movilizacion_vs_Municipal), "entero"))}
        ${linea("Brecha vs municipal", fmt(num(d.Brecha_Participacion_vs_Municipal), "porcentaje"))}
      </div>

      <div class="popup-section">
        <b>Composición por edad</b>
        ${linea("Grupo dominante votos", txt(d.Grupo_Dominante_Votos))}
        ${linea("Grupo mayor no voto", txt(d.Grupo_Mayor_No_Voto))}
        ${linea("Grupo mayor participación", txt(d.Grupo_Mayor_Participacion))}
        ${linea("Grupo menor participación", txt(d.Grupo_Menor_Participacion))}
        ${linea("Tipo composición", txt(d.Tipo_Composicion_Edad))}
      </div>

      <div class="popup-section">
        <b>Peso relativo del voto por grupo de edad</b>
        <div class="peso-voto-grid">
          ${pesoCard("18-29", d["Pct_Votos_18-29"])}
          ${pesoCard("30-39", d["Pct_Votos_30-39"])}
          ${pesoCard("40-49", d["Pct_Votos_40-49"])}
          ${pesoCard("50-59", d["Pct_Votos_50-59"])}
          ${pesoCard("60-79", d["Pct_Votos_60-79"])}
          ${pesoCard("80+", d["Pct_Votos_80+"])}
        </div>
      </div>

      <div class="popup-section">
        <b>Índices</b>
        ${linea("HHI edad", fmt(num(d.HHI_Grupos_Edad_0_100), "numero"))}
        ${linea("Cramer V edad", fmt(num(d.Cramer_V_Grupos_Edad), "numero"))}
        ${linea("Brecha edad", fmt(num(d.Brecha_Max_Min_Participacion_Grupos), "porcentaje"))}
        ${linea("Segmentación edad", fmt(num(d.Indice_Segmentacion_Edad_0_100), "numero"))}
      </div>

      <div class="popup-section">
        <b>Lectura</b><br>
        ${txt(d.Recomendacion)}
      </div>
    </div>
  `;
}

function actualizarMapa() {
  if (!geojsonData) return;

  capasPorSeccion = {};

  if (capa) {
    map.removeLayer(capa);
  }

  capa = L.geoJSON(geojsonData, {
    style: estilo,
    onEachFeature: function(feature, layer) {
      const seccion = obtenerSeccionGeojson(feature.properties);
      const d = datos[seccion];

      capasPorSeccion[seccion] = layer;

      layer.bindPopup(popupHTML(seccion, d));

      layer.on("mouseover", function() {
        layer.setStyle({
          weight: 2,
          color: "#111827",
          fillOpacity: 0.9
        });
      });

      layer.on("mouseout", function() {
        capa.resetStyle(layer);
      });
    }
  }).addTo(map);

  actualizarResumen();
  actualizarLeyenda();
}

function actualizarResumen() {
  let total = 0;
  let visibles = 0;
  let ln = 0;
  let votos = 0;
  let noVoto = 0;
  let potencial = 0;

  Object.values(datos).forEach(d => {
    total += 1;

    if (pasaFiltros(d)) {
      visibles += 1;
      ln += num(d.Lista_Nominal) || 0;
      votos += num(d.Votantes) || 0;
      noVoto += num(d.No_Voto_Total) || 0;
      potencial += num(d.Potencial_Movilizacion_vs_Municipal) || 0;
    }
  });

  const participacion = ln > 0 ? votos / ln : null;
  const variable = document.getElementById("variableMapa").value;

  document.getElementById("resumen").innerHTML = `
    <b>Variable activa:</b> ${nombresVariable[variable]}<br>
    <b>Secciones visibles:</b> ${visibles} de ${total}<br>
    <b>Lista nominal visible:</b> ${ln.toLocaleString("es-MX")}<br>
    <b>Votantes visibles:</b> ${votos.toLocaleString("es-MX")}<br>
    <b>No voto visible:</b> ${noVoto.toLocaleString("es-MX")}<br>
    <b>Potencial visible:</b> ${Math.round(potencial).toLocaleString("es-MX")}<br>
    <b>Participación visible:</b> ${fmt(participacion, "porcentaje")}
  `;
}

function actualizarLeyenda() {
  const variable = document.getElementById("variableMapa").value;

  if (legend) {
    map.removeControl(legend);
  }

  legend = L.control({ position: "bottomright" });

  legend.onAdd = function() {
    const div = L.DomUtil.create("div", "legend");

    div.innerHTML = `<b>${nombresVariable[variable]}</b><br>`;

    if (variable === "Tipo_Composicion_Edad") {
      ["Concentrada", "Media", "Diversificada", "Sin dato"].forEach(k => {
        div.innerHTML += `<span style="background:${coloresComposicion[k]}"></span>${k}<br>`;
      });
      return div;
    }

    const valores = valoresCampo(variable);
    const colores = coloresContinuos[variable];

    if (valores.length === 0) {
      div.innerHTML += "Sin datos";
      return div;
    }

    const min = Math.min(...valores);
    const max = Math.max(...valores);

    for (let i = 0; i < 5; i++) {
      const a = min + (max - min) * (i / 5);
      const b = min + (max - min) * ((i + 1) / 5);

      div.innerHTML += `
        <span style="background:${colores[i]}"></span>
        ${fmt(a, "numero")} - ${fmt(b, "numero")}<br>
      `;
    }

    return div;
  };

  legend.addTo(map);
}

function limpiarFiltros() {
  document.getElementById("filtroOportunidad").value = "";
  document.getElementById("filtroHHI").value = "";
  document.getElementById("filtroCramer").value = "";
  document.getElementById("filtroComposicion").value = "";
  document.getElementById("buscarSeccion").value = "";
  actualizarMapa();
}

function buscarSeccion() {
  const seccion = normalizarSeccion(document.getElementById("buscarSeccion").value);

  if (!seccion) return;

  const layer = capasPorSeccion[seccion];

  if (!layer) {
    alert("No encontré esa sección.");
    return;
  }

  map.fitBounds(layer.getBounds(), { padding: [60, 60], maxZoom: 15 });
  layer.openPopup();
}

document.getElementById("buscarSeccion").addEventListener("keyup", function(e) {
  if (e.key === "Enter") {
    buscarSeccion();
  }
});

[
  "variableMapa",
  "filtroOportunidad",
  "filtroHHI",
  "filtroCramer",
  "filtroComposicion"
].forEach(id => {
  document.getElementById(id).addEventListener("change", actualizarMapa);
});

Promise.all([
  fetch("./mazatlan_secciones_5pct_wgs84.geojson").then(r => r.json()),
  fetch("./composicion_2024_indices.json").then(r => r.json())
])
.then(([geojson, indices]) => {
  geojsonData = geojson;
  datosArray = indices;

  indices.forEach(d => {
    datos[normalizarSeccion(d.SECCION)] = d;
  });

  actualizarMapa();

  const bounds = L.geoJSON(geojsonData).getBounds();
  map.fitBounds(bounds);
})
.catch(error => {
  console.error(error);
  document.getElementById("resumen").innerHTML = `
    <b>Error cargando archivos.</b><br>
    Revisa que estén en la misma carpeta:<br>
    composicion_2024_indices.json<br>
    mazatlan_secciones_5pct_wgs84.geojson
  `;
});
</script>

</body>
</html>
