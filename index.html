<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa distrital de aspirantes - Mazatlán</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .panel {
      max-width: 1200px;
      margin: 24px auto 16px;
      padding: 0 18px;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 18px;
      align-items: end;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    p {
      margin: 0;
      color: #475467;
      font-size: 14px;
      line-height: 1.5;
    }

    label {
      font-weight: 700;
      display: block;
      margin-bottom: 8px;
    }

    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #d0d5dd;
      font-size: 16px;
      background: white;
    }

    #map {
      max-width: 1200px;
      height: 720px;
      margin: 0 auto 28px;
      border: 1px solid #d0d5dd;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
    }

    .info-box {
      font-size: 15px;
      line-height: 1.55;
    }

    .info-box strong {
      font-size: 18px;
    }

    .badge {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      color: white;
      font-weight: 700;
      font-size: 12px;
      margin-top: 6px;
    }

    .legend {
      background: white;
      padding: 12px 14px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      font-size: 13px;
      line-height: 1.6;
    }

    .legend span {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: middle;
    }

    @media (max-width: 800px) {
      .panel {
        grid-template-columns: 1fr;
      }

      #map {
        height: 620px;
        border-radius: 0;
      }
    }
  </style>
</head>

<body>

  <div class="panel">
    <div class="card">
      <label for="districtSelect">Seleccionar distrito</label>
      <select id="districtSelect">
        <option value="">Cargando distritos...</option>
      </select>
    </div>

    <div class="card">
      <h1 id="districtTitle">Mapa distrital de aspirantes</h1>
      <p id="districtInfo">Selecciona un distrito para ver aspirantes registrados y semáforo territorial.</p>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([23.245, -106.41], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let geojsonLayer;
    let selectedDistrict = null;
    let aspirantesPorDistrito = {};

    const districtSelect = document.getElementById('districtSelect');
    const districtTitle = document.getElementById('districtTitle');
    const districtInfo = document.getElementById('districtInfo');

    function getDistrito(feature) {
      return String(feature.properties.distrito_l);
    }

    function getDatosDistrito(distrito) {
      return aspirantesPorDistrito[String(distrito)] || {
        total_aspirantes: 0,
        color: '#E53935'
      };
    }

    function getSemaforo(total) {
      if (total < 10) return 'Rojo';
      if (total <= 20) return 'Amarillo';
      return 'Verde';
    }

    function getColor(total) {
      if (total < 10) return '#E53935';
      if (total <= 20) return '#FBC02D';
      return '#43A047';
    }

    function styleByDistrict(feature) {
      const distrito = getDistrito(feature);
      const datos = getDatosDistrito(distrito);
      const total = Number(datos.total_aspirantes || 0);
      const color = datos.color || getColor(total);

      const isSelected = selectedDistrict && String(selectedDistrict) === String(distrito);

      return {
        color: isSelected ? '#111827' : '#334155',
        weight: isSelected ? 3 : 1,
        fillColor: color,
        fillOpacity: isSelected ? 0.75 : 0.48
      };
    }

    function popupContent(props) {
      const distrito = String(props.distrito_l);
      const datos = getDatosDistrito(distrito);
      const total = Number(datos.total_aspirantes || 0);
      const semaforo = datos.semaforo || getSemaforo(total);
      const color = datos.color || getColor(total);

      return `
        <div class="info-box">
          <strong>Distrito INE ${distrito}</strong><br>
          <b>Aspirantes registrados:</b> ${total}<br>
          <b>Semáforo:</b> ${semaforo}<br>
          <span class="badge" style="background:${color};">${semaforo}</span>
        </div>
      `;
    }

    function updateInfo(distrito) {
      const datos = getDatosDistrito(distrito);
      const total = Number(datos.total_aspirantes || 0);
      const semaforo = datos.semaforo || getSemaforo(total);
      const color = datos.color || getColor(total);

      let rangoEdad = '';

      if (datos.rango_edad_principal) {
        rangoEdad = `<br><b>Rango de edad dominante:</b> ${datos.rango_edad_principal}`;
      }

      if (datos.edad_18_29 !== undefined || datos.edad_30_44 !== undefined || datos.edad_45_59 !== undefined || datos.edad_60_mas !== undefined) {
        rangoEdad += `
          <br><br>
          <b>Rangos de edad:</b><br>
          18 a 29: ${datos.edad_18_29 || 0}<br>
          30 a 44: ${datos.edad_30_44 || 0}<br>
          45 a 59: ${datos.edad_45_59 || 0}<br>
          60 o más: ${datos.edad_60_mas || 0}
        `;
      }

      districtTitle.innerText = `Distrito INE ${distrito}`;

      districtInfo.innerHTML = `
        <b>Aspirantes registrados:</b> ${total}<br>
        <b>Semáforo:</b> <span style="font-weight:700; color:${color};">${semaforo}</span>
        ${rangoEdad}
      `;
    }

    function selectDistrict(distrito) {
      if (!geojsonLayer) return;

      selectedDistrict = String(distrito);

      let bounds = [];

      geojsonLayer.eachLayer(layer => {
        const layerDistrito = getDistrito(layer.feature);

        layer.setStyle(styleByDistrict(layer.feature));

        if (String(layerDistrito) === String(distrito)) {
          bounds.push(layer.getBounds());
        }
      });

      if (bounds.length > 0) {
        let groupBounds = bounds[0];

        for (let i = 1; i < bounds.length; i++) {
          groupBounds.extend(bounds[i]);
        }

        map.fitBounds(groupBounds, { padding: [40, 40] });
        updateInfo(distrito);
      }
    }

    Promise.all([
      fetch('mazatlan_secciones_5pct_wgs84.geojson').then(response => response.json()),
      fetch('distritos_aspirantes.json').then(response => response.json())
    ])
      .then(([geojsonData, aspirantesData]) => {
        aspirantesPorDistrito = aspirantesData;

        geojsonLayer = L.geoJSON(geojsonData, {
          style: styleByDistrict,
          onEachFeature: function(feature, layer) {
            const props = feature.properties;
            const distrito = String(props.distrito_l);

            layer.bindPopup(() => popupContent(props));

            layer.on('click', function() {
              districtSelect.value = distrito;
              selectDistrict(distrito);
              layer.openPopup();
            });
          }
        }).addTo(map);

        map.fitBounds(geojsonLayer.getBounds());

        const distritos = [...new Set(
          geojsonData.features
            .map(f => String(f.properties.distrito_l))
            .filter(Boolean)
        )].sort((a, b) => Number(a) - Number(b));

        districtSelect.innerHTML = '<option value="">Selecciona un distrito</option>';

        distritos.forEach(distrito => {
          const datos = getDatosDistrito(distrito);
          const total = Number(datos.total_aspirantes || 0);
          const option = document.createElement('option');
          option.value = distrito;
          option.textContent = `Distrito INE ${distrito} - ${total} aspirantes`;
          districtSelect.appendChild(option);
        });

        districtSelect.addEventListener('change', function() {
          if (this.value) {
            selectDistrict(this.value);
          }
        });

        const legend = L.control({ position: 'bottomright' });

        legend.onAdd = function () {
          const div = L.DomUtil.create('div', 'legend');
          div.innerHTML = `
            <strong>Semáforo de aspirantes</strong><br>
            <span style="background:#E53935;"></span> Menor de 10<br>
            <span style="background:#FBC02D;"></span> 10 a 20<br>
            <span style="background:#43A047;"></span> Más de 20
          `;
          return div;
        };

        legend.addTo(map);
      })
      .catch(error => {
        districtSelect.innerHTML = '<option>Error al cargar datos</option>';
        districtTitle.innerText = 'Error al cargar el mapa';
        districtInfo.innerText = 'Revisa que los archivos mazatlan_secciones_5pct_wgs84.geojson y distritos_aspirantes.json estén en el mismo repositorio.';
        console.error(error);
      });
  </script>

</body>
</html>
